<div class="page" id="page-signin-error" data-page="signin-error">
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h2>NutriSurvey</h2>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active">Sign In</button>
        <button class="auth-tab">Sign Up</button>
      </div>

      <div class="alert alert-error" style="display:flex;align-items:center;gap:8px;margin-top:12px;">
        <span style="font-size:18px;">&#10007;</span>
        <span>
          <strong>Login Gagal</strong><br>
          <span style="font-size:13px;">Email atau password salah</span>
        </span>
      </div>

      <form class="auth-form">
        <div class="form-group">
          <label>Email:</label>
          <input type="email" class="form-input error" value="user@example.com" required />
        </div>

        <div class="form-group">
          <label>Password:</label>
          <div class="form-input-group">
            <input type="password" class="form-input error" value="password123" required />
            <button type="button" class="input-action">&#128065;</button>
          </div>
        </div>

        <div style="text-align:right;margin-bottom:12px;">
          <a href="#" onclick="return false;" style="font-size:13px;color:var(--text-light);">Lupa Password?</a>
        </div>

        <button type="submit" class="btn btn-primary">COBA LAGI</button>
      </form>
    </div>
  </div>
</div>
