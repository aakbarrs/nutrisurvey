<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Profil - NutriSurvey</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .avatar-placeholder { width: 72px; height: 72px; border-radius: 50%; background: var(--orange); color: var(--white); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; margin: 0 auto 12px; }
    .menu-link { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--gray-100); cursor: pointer; transition: all var(--transition); }
    .menu-link:last-child { border-bottom: none; }
    .menu-link:hover { opacity: 0.8; }
    .menu-link .ml-icon { width: 40px; height: 40px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .menu-link .ml-content { flex: 1; }
    .menu-link .ml-content .ml-title { font-size: 14px; font-weight: 600; }
    .menu-link .ml-content .ml-desc { font-size: 12px; color: var(--text-light); margin-top: 2px; }
    .menu-link .ml-arrow { color: var(--text-muted); font-size: 18px; }
    .highlighted { border: 2px solid var(--green); border-radius: var(--radius); padding: 12px; margin: -2px; }
  </style>
</head>
<body>
  <div class="page active" data-page="menu-profil">
    <header class="page-header">
      <button class="back-btn" onclick="App.navigate('dashboard')">&#8592;</button>
      <h1>Menu Profil</h1>
    </header>
    <div class="page-content" id="menuProfilContent">
      <div class="card" style="text-align:center;padding:24px;">
        <div class="avatar-placeholder">U</div>
        <h2 style="font-size:20px;font-weight:700;">Pengguna</h2>
        <p style="font-size:14px;color:var(--text-light);">pengguna@email.com</p>
      </div>

      <div class="card">
        <div class="menu-link" onclick="App.navigate('atur-preferensi')">
          <div class="ml-icon" style="background:rgba(255,107,53,0.12);color:var(--orange);">&#129381;</div>
          <div class="ml-content">
            <div class="ml-title">Preferensi Diet</div>
            <div class="ml-desc">Atur preferensi makanan</div>
          </div>
          <div class="ml-arrow">&#8250;</div>
        </div>
      </div>

      <div class="card" style="border:2px solid var(--green);border-radius:var(--radius);">
        <div class="menu-link" onclick="App.navigate('pengaturan-notifikasi')" style="padding:12px 0;">
          <div class="ml-icon" style="background:rgba(76,175,80,0.12);color:var(--green);">&#128276;</div>
          <div class="ml-content">
            <div class="ml-title">Pengingat Notifikasi</div>
            <div class="ml-desc">Atur pengingat makan</div>
          </div>
          <div class="ml-arrow">&#8250;</div>
        </div>
      </div>

      <div class="card">
        <div class="menu-link" onclick="App.showToast('Fitur Privasi & Keamanan', 'info')">
          <div class="ml-icon" style="background:rgba(52,152,219,0.12);color:var(--blue);">&#128274;</div>
          <div class="ml-content">
            <div class="ml-title">Privasi &amp; Keamanan</div>
            <div class="ml-desc">Pengaturan akun Anda</div>
          </div>
          <div class="ml-arrow">&#8250;</div>
        </div>
      </div>

      <div class="card">
        <div class="menu-link" onclick="App.showToast('NutriSurvey v1.0.0', 'info')">
          <div class="ml-icon" style="background:rgba(156,39,176,0.12);color:var(--purple);">&#9432;</div>
          <div class="ml-content">
            <div class="ml-title">Tentang Aplikasi</div>
            <div class="ml-desc">Info dan versi aplikasi</div>
          </div>
          <div class="ml-arrow">&#8250;</div>
        </div>
      </div>

      <div class="card card-blue" style="margin-top:16px;">
        <div class="card-header">
          <div class="card-icon">&#128161;</div>
          <h3>Tips</h3>
        </div>
        <div class="card-body">
          Anda dapat mengatur notifikasi yang sesuai dengan kebutuhan
        </div>
      </div>
    </div>
  </div>
</body>
</html>
