<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifikasi Tersimpan - NutriSurvey</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .big-check { width: 72px; height: 72px; border-radius: 50%; background: var(--green); color: var(--white); display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 16px; }
    .jadwal-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--gray-100); font-size: 14px; }
    .jadwal-item:last-child { border-bottom: none; }
    .jadwal-item .ji-time { font-weight: 700; min-width: 48px; text-align: right; }
  </style>
</head>
<body>
  <div class="page active" data-page="notifikasi-sukses">
    <header class="page-header">
      <button class="back-btn" onclick="App.navigate('pengaturan-notifikasi')">&#8592;</button>
      <h1>Pengaturan Notifikasi</h1>
    </header>
    <div class="page-content" id="notifikasiSuksesContent">
      <div class="success-page">
        <div class="big-check">&#10003;</div>
        <h2>Berhasil Disimpan!</h2>
        <p>Pengaturan pengingat telah tersimpan</p>
      </div>

      <div class="section-header">
        <h2>&#128197; Jadwal Pengingat Anda</h2>
      </div>

      <div class="card">
        <div class="jadwal-item">
          <span>&#127840; Sarapan: 07:00</span>
          <span style="flex:1;"></span>
          <span class="ji-time" style="color:var(--orange);">07:00</span>
        </div>
        <div class="jadwal-item">
          <span>&#127835; Makan Siang: 12:00</span>
          <span style="flex:1;"></span>
          <span class="ji-time" style="color:#F57F17;">12:00</span>
        </div>
        <div class="jadwal-item" style="border-bottom:none;">
          <span>&#127769; Makan Malam: 18:00</span>
          <span style="flex:1;"></span>
          <span class="ji-time" style="color:var(--blue);">18:00</span>
        </div>
      </div>

      <div class="card card-blue" style="margin-top:16px;">
        <div class="card-header">
          <div class="card-icon">&#10003;</div>
          <h3>Notifikasi akan dikirim sesuai hari</h3>
        </div>
        <div class="card-body">
          Pastikan notifikasi aktif dalam sistem
        </div>
      </div>

      <button class="btn btn-primary" onclick="App.navigate('dashboard')">&#127968; KEMBALI KE DASHBOARD</button>
    </div>
  </div>
</body>
</html>
