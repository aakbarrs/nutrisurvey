<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memproses - NutriSurvey</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .loading-icon { font-size: 56px; margin-bottom: 16px; display:inline-block; }
    .status-list { margin-top: 20px; }
    .status-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 14px; color: var(--text-light); }
    .status-item .status-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .status-item.done { color: var(--green); }
    .status-item.done .status-icon { background: var(--green); color: var(--white); }
    .status-item.active { color: var(--text); }
    .status-item.active .status-icon { border: 2px solid var(--orange); border-top-color: transparent; animation: spin 0.8s linear infinite; background:transparent; }
  </style>
</head>
<body>
  <div class="page active" data-page="loading-analisis">
    <header class="page-header">
      <button class="back-btn" onclick="App.navigate('laporan-analisis')">&#8592;</button>
      <h1>Analisis Mingguan</h1>
    </header>
    <div class="page-content" style="text-align:center;padding-top:40px;">
      <div class="loading-icon" style="animation:spin 2s linear infinite;">&#9203;</div>
      <h2 style="font-size:20px;font-weight:700;margin-bottom:6px;">Memproses Data...</h2>
      <p style="font-size:14px;color:var(--text-light);margin-bottom:24px;">Menganalisis konsumsi 7 hari terakhir</p>

      <div class="progress-bar" style="margin:0 auto 24px;max-width:280px;">
        <div class="progress-fill orange" id="loadingProgress" style="width:65%;animation:pulse 2s ease infinite;"></div>
      </div>

      <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px;">Mengolah data dan Statistik...</p>

      <div class="card" style="text-align:left;max-width:320px;margin:0 auto;">
        <div class="status-list">
          <div class="status-item" id="statusData">
            <div class="status-icon">&#10003;</div>
            <span>Data tersimpan</span>
          </div>
          <div class="status-item" id="statusHitung">
            <div class="status-icon" style="background:transparent;"></div>
            <span>Menghitung...</span>
          </div>
          <div class="status-item" id="statusVisual">
            <div class="status-icon" style="background:transparent;"></div>
            <span>Visualisasi...</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    setTimeout(function() {
      if (typeof App !== 'undefined') {
        App.navigate('laporan-7hari');
      }
    }, 2500);
  </script>
</body>
</html>
