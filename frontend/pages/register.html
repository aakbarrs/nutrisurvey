<div class="page" id="page-register" data-page="register">
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Daftar Akun Anda</h2>
      </div>

      <div class="section-header" style="margin-bottom:12px;"><h3>Buat Akun Baru</h3></div>

      <div id="registerAlert" class="alert alert-warning" style="display:none;">
        <span class="alert-icon">⚠️</span>
        <span id="registerAlertMsg"></span>
      </div>

      <form id="registerPageForm">
        <div class="form-group">
          <label>Nama Lengkap:</label>
          <input type="text" class="form-input" id="regPageName" placeholder="Masukkan nama lengkap" required />
        </div>

        <div class="form-group">
          <label>Email:</label>
          <input type="email" class="form-input" id="regPageEmail" placeholder="nama@email.com" required />
        </div>

        <div class="form-group">
          <label>Password:</label>
          <div class="form-input-group">
            <input type="password" class="form-input" id="regPagePassword" placeholder="Minimal 8 karakter" minlength="8" required />
            <button type="button" class="input-action" onclick="togglePassword('regPagePassword', this)">&#128065;</button>
          </div>
        </div>

        <div class="form-group">
          <label>Konfirmasi Password:</label>
          <input type="password" class="form-input" id="regPageConfirmPassword" placeholder="Ketik ulang password" required />
        </div>

        <label class="check-item" style="margin-bottom:12px;">
          <input type="checkbox" id="regPageTerms" />
          <span class="check-indicator"></span>
          <span class="check-label" style="font-size:13px;">Saya menyetujui Syarat &amp; Ketentuan</span>
        </label>

        <p style="font-size:11px;color:var(--text-muted);margin-bottom:16px;">Informasi Anda akan dijaga sesuai dengan Kebijakan Privasi kami</p>

        <button type="submit" class="btn btn-primary" id="regPageBtn">DAFTAR</button>
      </form>
    </div>
  </div>
</div>
