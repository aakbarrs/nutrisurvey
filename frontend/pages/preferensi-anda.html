<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preferensi Anda - NutriSurvey</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="page active" data-page="preferensi-anda">
    <header class="page-header">
      <button class="back-btn" onclick="App.navigate('dashboard')">&#8592;</button>
      <h1>Preferensi Anda</h1>
    </header>
    <div class="page-content" id="preferensiAndaContent">
      <div class="card card-green">
        <div class="card-header">
          <div class="card-icon">&#127919;</div>
          <h3>Status Nutrisi Anda</h3>
        </div>
        <div class="card-body">
          Atur preferensi makanan untuk mendapatkan rekomendasi menu yang sesuai dengan kebutuhan dan target kesehatan Anda.
        </div>
      </div>

      <div class="section-header">
        <h2>Preferensi Diet:</h2>
      </div>

      <div class="card">
        <div class="check-group">
          <label class="check-item">
            <input type="checkbox">
            <span class="check-indicator"></span>
            <span class="check-label">Alergi makanan</span>
          </label>
          <label class="check-item">
            <input type="checkbox">
            <span class="check-indicator"></span>
            <span class="check-label">Target kesehatan khusus</span>
          </label>
          <label class="check-item">
            <input type="checkbox">
            <span class="check-indicator"></span>
            <span class="check-label">Preferensi Diet (vegetarian, bebas gula, dll)</span>
          </label>
        </div>
      </div>

      <button class="btn btn-primary" onclick="App.navigate('atur-preferensi')">ATUR PREFERENSI</button>

      <div style="text-align:center;margin-top:16px;">
        <a href="#" onclick="App.navigate('dashboard')" style="font-size:13px;color:var(--text-light);">Lewati, lanjutkan tanpa preferensi</a>
      </div>
    </div>
  </div>
</body>
</html>
