<div class="page" id="page-selamat-datang" data-page="selamat-datang">
  <div class="page-header">
    <button class="back-btn" onclick="navigateTo('verifikasi-email')">←</button>
    <h1>Selamat Datang!</h1>
  </div>

  <div class="page-content" style="padding-top:60px;">
    <div class="success-page">
      <div class="success-icon" style="font-size:40px;">✓</div>

      <h2>Email Terverifikasi!</h2>
      <p>Silakan login untuk melanjutkan</p>

      <form id="welcomeLoginForm" style="text-align:left;margin-top:24px;">
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-input" id="welcomeEmail" value="" placeholder="@namaemailuser" required />
        </div>

        <div class="form-group">
          <label>Password:</label>
          <div class="form-input-group">
            <input type="password" class="form-input" id="welcomePassword" placeholder="********" required />
            <button type="button" class="input-action" onclick="togglePassword('welcomePassword', this)">&#128065;</button>
          </div>
        </div>

        <div class="check-item" style="margin-bottom:16px;">
          <input type="checkbox" id="welcomeRemember" />
          <span class="check-indicator"></span>
          <span class="check-label" style="font-size:13px;">Ingat saya</span>
        </div>

        <button type="submit" class="btn btn-primary">MASUK</button>
      </form>
    </div>
  </div>
</div>
